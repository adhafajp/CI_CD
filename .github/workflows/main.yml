name: CI/CD MLflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MLFLOW_TRACKING_URI: sqlite:///${{ github.workspace }}/MLproject/mlflow.db

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mlflow-${{ hashFiles('MLproject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-mlflow-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow pandas scikit-learn numpy cloudpickle psutil scipy

      - name: Run MLflow project
        run: |
          cd MLproject
          echo "Running MLflow project with tracking URI: $MLFLOW_TRACKING_URI"
          mlflow run . --env-manager=local -P dataset="train_pca.csv"

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          cd MLproject
          RUN_ID=$(python -c "
          from mlflow.tracking import MlflowClient
          
          client = MlflowClient()
          runs = client.search_runs(
              experiment_ids=['0'], 
              order_by=['start_time DESC'], 
              max_results=1
          )
          
          if not runs:
              raise RuntimeError('No MLflow runs found in tracking store')
          
          print(runs[0].info.run_id)
          ")
          
          echo "Retrieved RUN_ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Validate model inference
        run: |
          cd MLproject
          python -c "
          import mlflow
          import sys
          import pandas as pd
          import numpy as np
          
          RUN_ID = '${{ steps.get_run_id.outputs.run_id }}'
          print(f'Validating model from run: {RUN_ID}')
          
          try:
              model = mlflow.pyfunc.load_model(f'runs:/{RUN_ID}/model')
              print('Model loaded successfully')
              
              input_schema = model.metadata.get_input_schema()
              
              dummy_data = {}
              for col in input_schema.inputs:
                  col_name = col.name
                  col_type = str(col.type).lower()
                  
                  if 'double' in col_type or 'float' in col_type:
                      dummy_data[col_name] = 0.0
                  elif 'long' in col_type or 'int' in col_type or 'integer' in col_type:
                      dummy_data[col_name] = 0
                  else:
                      dummy_data[col_name] = 'unknown'
              
              # Buat DataFrame dari dummy data
              dummy_df = pd.DataFrame([dummy_data])
              print(f'Dummy input created with shape: {dummy_df.shape}')
              
              pred = model.predict(dummy_df)
              
              # Cek hasil prediksi
              if hasattr(pred, 'shape'):
                  print(f'Prediction test passed. Output shape: {pred.shape}')
              else:
                  print(f'Prediction test passed. Output: {pred}')
                  
          except Exception as e:
              print(f'Model validation failed: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Build Docker Model
        run: |
          cd MLproject
          RUN_ID="${{ steps.get_run_id.outputs.run_id }}"
          echo "Building Docker image from run: $RUN_ID"
          
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "cc_learn" \
            --env-manager local

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}"
          
          echo "Tagging images..."
          docker tag cc_learn "$DOCKER_USER/cc_learn:$IMAGE_TAG"
          docker tag cc_learn "$DOCKER_USER/cc_learn:latest"
          
          echo "Pushing to Docker Hub..."
          docker push "$DOCKER_USER/cc_learn:$IMAGE_TAG"
          docker push "$DOCKER_USER/cc_learn:latest"
          
          echo "Successfully pushed:"
          echo "  - $DOCKER_USER/cc_learn:$IMAGE_TAG"
          echo "  - $DOCKER_USER/cc_learn:latest"

      - name: Summary
        if: always()
        run: |
          {
            echo "## MLflow CI/CD Pipeline Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| MLflow Run ID | \`${{ steps.get_run_id.outputs.run_id }}\` |"
            echo "| Git Commit SHA | \`${{ github.sha }}\` |"
            echo "| Docker Image | \`${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:${{ github.sha }}\` |"
            echo "| Docker Tag (latest) | \`${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:latest\` |"
            echo "| MLflow Version | \`$(mlflow --version)\` |"
            echo "| Python Version | \`3.12\` |"
            echo ""
            echo "### Artifacts"
            echo "- Model artifacts stored in: \`MLproject/mlruns/\`"
            echo "- Metadata stored in: \`MLproject/mlflow.db\`"
          } >> $GITHUB_STEP_SUMMARY