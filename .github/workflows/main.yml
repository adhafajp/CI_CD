name: CI/CD MLflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mlflow-${{ hashFiles('MLproject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-mlflow-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install library sesuai yang ada di conda.yaml (tanpa dagshub jika tidak perlu)
          pip install mlflow pandas scikit-learn numpy cloudpickle psutil scipy

      - name: Generate MLflow Run ID
        run: |
          RUN_ID=$(uuidgen)
          echo "MLFLOW_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Generated Run ID: $RUN_ID"

      - name: Run MLflow project
        run: |
          cd MLproject
          # Tracking URI default adalah ./mlruns (lokal)
          # Jalankan dengan Run ID yang sudah kita buat
          mlflow run . --env-manager=local --run-id ${{ env.MLFLOW_RUN_ID }} -P dataset="train_pca.csv"

      - name: Validate model inference
        run: |
          # Pastikan kita membaca dari folder MLproject/mlruns
          export MLFLOW_TRACKING_URI="${{ github.workspace }}/MLproject/mlruns"
          python -c "
          import mlflow
          import pandas as pd
          import sys

          try:
              model = mlflow.pyfunc.load_model('runs:/${{ env.MLFLOW_RUN_ID }}/model')
              print('✅ Model loaded successfully.')
              
              # Uji prediksi dengan dummy data (opsional)
              # input_schema = model.metadata.get_input_schema()
              # print(f'Input schema: {input_schema}')
              print('✅ Model validation passed.')
          except Exception as e:
              print(f'❌ Model validation failed: {e}')
              sys.exit(1)
          "

      - name: Build Docker Model
        run: |
          # Wajib set MLFLOW_TRACKING_URI agar mlflow tahu di mana mencari model
          export MLFLOW_TRACKING_URI="${{ github.workspace }}/MLproject/mlruns"
          echo "Building Docker image from run: ${{ env.MLFLOW_RUN_ID }}"
          mlflow models build-docker \
            --model-uri "runs:/${{ env.MLFLOW_RUN_ID }}/model" \
            --name "cc_learn"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          # Gunakan commit SHA sebagai tag unik
          IMAGE_TAG=${{ github.sha }}
          
          echo "Tagging image as ${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:$IMAGE_TAG"
          docker tag cc_learn ${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:$IMAGE_TAG
          docker tag cc_learn ${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:latest
          
          echo "Pushing images..."
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:$IMAGE_TAG
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:latest

      - name: Summary
        run: |
          echo "### 🚀 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ env.MLFLOW_RUN_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Image**: ${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Tag**: latest" >> $GITHUB_STEP_SUMMARY