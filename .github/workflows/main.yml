name: CI/CD MLflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MLFLOW_TRACKING_URI: sqlite:///${{ github.workspace }}/MLproject/mlflow.db

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mlflow-${{ hashFiles('MLproject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-mlflow-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow pandas scikit-learn numpy cloudpickle psutil scipy

      - name: Run MLflow project
        run: |
          cd MLproject
          echo "Running MLflow project with tracking URI: $MLFLOW_TRACKING_URI"
          mlflow run . --env-manager=local -P dataset="train_pca.csv"

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          cd MLproject
          RUN_ID=$(python -c "
          from mlflow.tracking import MlflowClient
          
          client = MlflowClient()
          runs = client.search_runs(
              experiment_ids=['0'], 
              order_by=['start_time DESC'], 
              max_results=1
          )
          
          if not runs:
              raise RuntimeError('No MLflow runs found in tracking store')
          
          print(runs[0].info.run_id)
          ")
          
          echo "Retrieved RUN_ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Validate model inference
        run: |
          cd MLproject
          python -c "
          import mlflow
          import sys
          import pandas as pd
          import numpy as np
          
          RUN_ID = '${{ steps.get_run_id.outputs.run_id }}'
          print(f'Validating model from run: {RUN_ID}')
          
          try:
              model = mlflow.pyfunc.load_model(f'runs:/{RUN_ID}/model')
              print('Model loaded successfully')
              
              input_schema = model.metadata.get_input_schema()
              
              dummy_data = {}
              for col in input_schema.inputs:
                  col_name = col.name
                  col_type = str(col.type).lower()
                  
                  if 'double' in col_type or 'float' in col_type:
                      dummy_data[col_name] = 0.0
                  elif 'long' in col_type or 'int' in col_type or 'integer' in col_type:
                      dummy_data[col_name] = 0
                  else:
                      dummy_data[col_name] = 'unknown'
              
              dummy_df = pd.DataFrame([dummy_data])
              print(f'Dummy input created with shape: {dummy_df.shape}')
              
              pred = model.predict(dummy_df)
              
              if hasattr(pred, 'shape'):
                  print(f'Prediction test passed. Output shape: {pred.shape}')
              else:
                  print(f'Prediction test passed. Output: {pred}')
                  
          except Exception as e:
              print(f'Model validation failed: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Export model artifacts
        run: |
          cd MLproject
          RUN_ID="${{ steps.get_run_id.outputs.run_id }}"
          echo "Exporting model artifacts from run: $RUN_ID"
          
          python -c "
          import mlflow
          import shutil
          import os
          
          RUN_ID = '$RUN_ID'
          
          # Set tracking URI
          mlflow.set_tracking_uri('sqlite:///mlflow.db')
          
          # Buat folder model_dir
          os.makedirs('model_dir', exist_ok=True)
          
          # Download artifacts dari run
          client = mlflow.tracking.MlflowClient()
          
          # Cari tahu path artifact yang benar
          run = client.get_run(RUN_ID)
          artifact_uri = run.info.artifact_uri
          print(f'Artifact URI: {artifact_uri}')
          
          # Download semua artifacts ke model_dir
          client.download_artifacts(RUN_ID, 'model', 'model_dir')
          
          print('Model artifacts downloaded successfully')
          
          print('Contents of model_dir:')
          for item in os.listdir('model_dir'):
              print(f'  - {item}')
              
          if os.path.exists('model_dir/model'):
              print('Contents of model_dir/model:')
              for item in os.listdir('model_dir/model'):
                  print(f'    - {item}')
          "
          
          echo "Verifying exported model structure:"
          ls -la MLproject/model_dir/
          
          if [ -d "MLproject/model_dir/model" ]; then
              echo "Moving contents from model_dir/model/ to model_dir/"
              mv MLproject/model_dir/model/* MLproject/model_dir/
              rmdir MLproject/model_dir/model
          fi
          
          echo "Final model_dir contents:"
          ls -la MLproject/model_dir/

      - name: Create Dockerfile
        run: |
          cd MLproject
          cat > Dockerfile << 'EOF'
          FROM python:3.12.7-slim
          
          WORKDIR /app
          
          RUN pip install --no-cache-dir \
              setuptools==82.0.1 \
              mlflow==3.10.1 \
              fastapi==0.112.2 \
              uvicorn==0.44.0 \
              scikit-learn==1.5.2 \
              pandas==2.3.3 \
              numpy==2.4.4 \
              psutil==6.0.0 \
              waitress==3.0.2
          
          COPY model_dir /app/model
          
          EXPOSE 5000
          
          CMD ["mlflow", "models", "serve", "-m", "/app/model", "--host", "0.0.0.0", "--port", "5000", "--no-conda"]
          EOF
          
          echo "Dockerfile created:"
          cat Dockerfile

      - name: Build Docker Model
        run: |
          cd MLproject
          echo "Building Docker image with custom Dockerfile..."
          
          docker build -t cc_learn .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}"
          
          echo "Tagging images..."
          docker tag cc_learn "$DOCKER_USER/cc_learn:$IMAGE_TAG"
          docker tag cc_learn "$DOCKER_USER/cc_learn:latest"
          
          echo "Pushing to Docker Hub..."
          docker push "$DOCKER_USER/cc_learn:$IMAGE_TAG"
          docker push "$DOCKER_USER/cc_learn:latest"
          
          echo "Successfully pushed:"
          echo "  - $DOCKER_USER/cc_learn:$IMAGE_TAG"
          echo "  - $DOCKER_USER/cc_learn:latest"

      - name: Summary
        if: always()
        run: |
          {
            echo "## MLflow CI/CD Pipeline Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| MLflow Run ID | \`${{ steps.get_run_id.outputs.run_id }}\` |"
            echo "| Git Commit SHA | \`${{ github.sha }}\` |"
            echo "| Docker Image | \`${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:${{ github.sha }}\` |"
            echo "| Docker Tag (latest) | \`${{ secrets.DOCKER_HUB_USERNAME }}/cc_learn:latest\` |"
            echo "| MLflow Version | \`$(mlflow --version)\` |"
            echo "| Python Version | \`3.12\` |"
            echo "| Docker Base Image | \`python:3.12.7-slim\` |"
            echo "| Model Port | \`5000\` |"
            echo ""
            echo "### Artifacts"
            echo "- Model artifacts stored in: \`MLproject/mlruns/\`"
            echo "- Metadata stored in: \`MLproject/mlflow.db\`"
            echo "- Dockerfile: Custom (python:3.12.7-slim)"
          } >> $GITHUB_STEP_SUMMARY